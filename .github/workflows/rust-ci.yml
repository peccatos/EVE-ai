name: Rust CI

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-ci:
    name: fmt-check-test-agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Show Rust versions
        run: |
          rustc --version
          cargo --version

      - name: Format check
        run: cargo fmt --check

      - name: Cargo check
        run: cargo check

      - name: Test production agent phase
        run: cargo test --test production_agent_phase16_17_tests -- --test-threads=1

      - name: Test LLM adapter
        run: cargo test --test llm_adapter_tests -- --test-threads=1

      - name: Test safe apply
        run: cargo test --test agent_safe_apply_tests -- --test-threads=1

      - name: Test TUI truth layer
        run: cargo test --test evolution_phase151x_tests -- --test-threads=1

      - name: Test Phase 16 readiness
        run: cargo test --test evolution_phase160p_readiness_tests -- --test-threads=1

      - name: Test production agent v2
        run: cargo test --test production_agent_v2_tests -- --test-threads=1

      - name: Test OpenAI structured proposals
        run: cargo test --test openai_structured_proposal_tests -- --test-threads=1

      - name: Test proposal preview and dry-run
        run: cargo test --test proposal_preview_dry_run_tests -- --test-threads=1

      - name: Test code edit engine
        run: cargo test --test code_edit_engine_tests -- --test-threads=1

      - name: Test repo-aware planner
        run: cargo test --test repo_aware_planner_tests -- --test-threads=1

      - name: Test task outcome memory
        run: cargo test --test task_outcome_memory_tests -- --test-threads=1

      - name: Test outcome learning
        run: cargo test --test evolution_phase18_outcome_learning_tests -- --test-threads=1

      - name: Test work fitness
        run: cargo test --test evolution_phase19_work_fitness_tests -- --test-threads=1

      - name: Test strategy selection
        run: cargo test --test evolution_phase19_strategy_selection_tests -- --test-threads=1

      - name: Test governed self-improvement
        run: cargo test --test evolution_phase20_self_improvement_tests -- --test-threads=1

      - name: Test library
        run: cargo test --lib

      - name: Full test suite
        run: cargo test

      - name: Agent readiness smoke
        run: cargo run -- agent-readiness

      - name: Agent v2 readiness smoke
        run: cargo run -- agent-v2-readiness

      - name: LLM health smoke
        run: cargo run -- llm-health

      - name: TUI snapshot smoke
        run: cargo run -- tui </dev/null
